<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>建築試験対策</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section id="p1">
    <h1>Anki!</h1>
    <div id="categoryButtons"></div>
  </section>

  <section id="p2" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1 id="categoryTitle"></h1>

    <p id="questionTitle"></p>
    <img id="questionImage" alt="建築写真" width="300">
    <div id="answerLabels"></div>

    <button>資料</button>
    <button id="answerToggleButton" onclick="toggleAnswer()">表示</button>
    <button onclick="previousQuestion()">前へ</button>
    <button onclick="nextQuestion()">次へ</button>
  </section>

  <script>
    let categories = [];
    let allQuestions = [];
    let questions = [];
    let currentQuestionIndex = 0;
    let isAnswerVisible = false;

    async function loadCategories() {
      const response = await fetch("category.json");
      categories = await response.json();
    }

    async function loadQuestions(category) {
      if (allQuestions.length === 0) {
        const response = await fetch("photo-database.json");
        allQuestions = await response.json();
      }

      questions = allQuestions.filter(question => question.category === category);
    }

    async function renderCategoryButtons() {
      await loadCategories();

      document.getElementById("categoryButtons").innerHTML = categories
        .map(category => {
          return `<button onclick="startCategory('${category}')">${category}</button>`;
        })
        .join("");
    }

    async function startCategory(category) {
      await loadQuestions(category);

      currentQuestionIndex = 0;
      isAnswerVisible = false;

      document.getElementById("categoryTitle").textContent = category + "（" + questions.length + "）";

      showPage("p2");
      renderQuestion();
    }

    function renderQuestion() {
      const question = questions[currentQuestionIndex];
      if (!question) return;

      document.getElementById("questionTitle").textContent = "Q" + (currentQuestionIndex+1)+ " " + question.questionTitle;

      document.getElementById("questionImage").src =
        question.image;

      document.getElementById("answerLabels").innerHTML =
        question.answerItems
          .map(item => `
            <div class="answer-item">
              <span class="answer-label">${item.label}：</span>
              <span class="answer-value ${isAnswerVisible ? "" : "is-hidden"}">
                ${item.value}
              </span>
            </div>
          `)
          .join("");

      const toggleButton =
        document.getElementById("answerToggleButton");

      toggleButton.classList.toggle(
        "is-visible",
        isAnswerVisible
      );
    }

    function toggleAnswer() {
      isAnswerVisible = !isAnswerVisible;
      renderQuestion();
    }

    function nextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        isAnswerVisible = false;
        renderQuestion();
      }      
    }

    function previousQuestion() {
      if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        isAnswerVisible = false;
        renderQuestion();
      }

      
    }

    function showPage(pageId) {
      document.getElementById("p1").hidden = true;
      document.getElementById("p2").hidden = true;

      document.getElementById(pageId).hidden = false;
    }

    renderCategoryButtons();
  </script>

</body>
</html>
