<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>建築試験対策</title>
</head>
<body>

  <section id="p1">
    <h1>Anki!</h1>
    <button onclick="showPage('p2')">建築史</button>
    <button onclick="showPage('p4')">各部寸法</button>
  </section>

  <section id="p2" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1>建築史</h1>

    <p id="questionTitle"></p>
    <img id="questionImage" alt="建築写真" width="300">
    <div id="answerLabels"></div>

    <button>資料</button>
    <button onclick="toggleAnswerValues()">表示</button>
    <button>前へ</button>
    <button onclick="showNextQuestion()">次へ</button>
  </section>

  <section id="p4" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1>各部寸法</h1>

    <p>問題表示エリア</p>

    <button>資料</button>
    <button>表示</button>
    <button>前へ</button>
    <button>次へ</button>
  </section>

  <script>
    let questions = [];
    let currentQuestion = null;
    let currentQuestionIndex = 0;
    let isAnswerVisible = false;

    async function loadQuestions() {
      if (questions.length > 0) return;

      const response = await fetch("photo-database.json");
      questions = await response.json();
    }

    async function showQuestionById(questionId) {
      await loadQuestions();

      const questionIndex = questions.findIndex(item => item.id === questionId);
      if (questionIndex === -1) return;

      currentQuestionIndex = questionIndex;
      currentQuestion = questions[currentQuestionIndex];
      isAnswerVisible = false;

      document.getElementById("questionTitle").textContent = currentQuestion.questionTitle;
      document.getElementById("questionImage").src = currentQuestion.image;

      renderAnswerItems();
    }

    function renderAnswerItems() {
      if (!currentQuestion) return;

      const labelsHtml = currentQuestion.answerItems
        .map(item => {
          const valueText = isAnswerVisible ? item.value : "";
          return `<p>${item.label}：${valueText}</p>`;
        })
        .join("");

      document.getElementById("answerLabels").innerHTML = labelsHtml;
    }

    function toggleAnswerValues() {
      isAnswerVisible = !isAnswerVisible;
      renderAnswerItems();
    }

    function showNextQuestion() {
      if (questions.length === 0) return;

      currentQuestionIndex = currentQuestionIndex + 1;

      if (currentQuestionIndex >= questions.length) {
        currentQuestionIndex = 0;
      }

      currentQuestion = questions[currentQuestionIndex];
      isAnswerVisible = false;

      document.getElementById("questionTitle").textContent = currentQuestion.questionTitle;
      document.getElementById("questionImage").src = currentQuestion.image;

      renderAnswerItems();
    }

    function showPage(pageId) {
      document.getElementById("p1").hidden = true;
      document.getElementById("p2").hidden = true;
      document.getElementById("p4").hidden = true;

      document.getElementById(pageId).hidden = false;

      if (pageId === "p2") {
        showQuestionById("伊勢神宮内宮正殿");
      }
    }
  </script>

</body>
</html>
