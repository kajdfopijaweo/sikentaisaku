<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>建築試験対策</title>
</head>
<body>

  <section id="p1">
    <h1>Anki!</h1>
    <button onclick="showPage('p2')">建築史</button>
    <button onclick="showPage('p4')">各部寸法</button>
  </section>

  <section id="p2" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1>建築史</h1>

    <p id="questionTitle"></p>
    <img id="questionImage" alt="建築写真" width="300">
    <div id="answerLabels"></div>

    <button>資料</button>
    <button onclick="toggleAnswer()">表示</button>
    <button onclick="previousQuestion()">前へ</button>
    <button onclick="nextQuestion()">次へ</button>
  </section>

  <section id="p4" hidden>
    <button onclick="showPage('p1')">戻る</button>
    <h1>各部寸法</h1>

    <p>問題表示エリア</p>

    <button>資料</button>
    <button>表示</button>
    <button>前へ</button>
    <button>次へ</button>
  </section>

  <script>
    let allQuestions = [];
    let questions = [];
    let currentQuestionIndex = 0;
    let isAnswerVisible = false;

    async function loadQuestions(category) {
      if (allQuestions.length === 0) {
        const response = await fetch("photo-database.json");
        allQuestions = await response.json();
      }
      questions = allQuestions.filter(question => question.category === category);
    }

    function renderQuestion() {
      const question = questions[currentQuestionIndex];

      document.getElementById("questionTitle").textContent = question.questionTitle;
      document.getElementById("questionImage").src = question.image;

      document.getElementById("answerLabels").innerHTML = question.answerItems
        .map(item => `<p>${item.label}：${isAnswerVisible ? item.value : ""}</p>`)
        .join("");
    }

    function toggleAnswer() {
      isAnswerVisible = !isAnswerVisible;
      renderQuestion();
    }

    function nextQuestion() {
      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
      }

      isAnswerVisible = false;
      renderQuestion();
    }

    function previousQuestion(){
      if (currentQuestionIndex > 0){
        currentQuestionIndex--;
      }
      isAnswerVisible = false;
      renderQuestion();
    }

    async function showPage(pageId) {
      document.getElementById("p1").hidden = true;
      document.getElementById("p2").hidden = true;
      document.getElementById("p4").hidden = true;

      document.getElementById(pageId).hidden = false;

      if (pageId === "p2") {
        await loadQuestions("日本古代建築史");
        currentQuestionIndex = 0;
        isAnswerVisible = false;
        renderQuestion();
      }
    }
  </script>

</body>
</html>
